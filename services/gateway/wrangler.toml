name = "chronoshealth-gateway"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "dev"

# identity-vault D1 (ADR 0003 / ADR 0010 / spec docs/spec/identity.md 5.1)
# PII + pseudonym 매핑 + 세션 토큰. 분석 DB와 별도 인스턴스.
[[d1_databases]]
binding = "IDENTITY_DB"
database_name = "chronoshealth-identity"
database_id = "1d2cb90a-b35c-46e3-bdaf-7ce8c471921d"
migrations_dir = "migrations/identity"

# analysis D1 (ADR 0003 / ADR 0008 / spec docs/spec/risk-survey/05-storage-consent.md)
# 설문 답변 + 리포트 + 동의 이력. user_pseudonym_id만 보유 (PII 0).
[[d1_databases]]
binding = "DB"
database_name = "chronoshealth-analysis"
database_id = "0ca4eed5-3786-40da-bd24-d78bea7cfb44"
migrations_dir = "migrations/analysis"

# 비밀 변수 — wrangler 으로 따로 주입 (절대 본 파일에 평문 금지). ADR 0011.
# BETA_SIGNUP_HMAC_SALT: 베타 등록 이메일 가명화용 HMAC-SHA256 키
#   $ wrangler secret put BETA_SIGNUP_HMAC_SALT
#   dev: .dev.vars (gitignore 됨) 의 BETA_SIGNUP_HMAC_SALT 사용
