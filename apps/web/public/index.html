    <meta property="og:type" content="website" />
    <title>Chronos Health — Coming Soon</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2216%22%20r%3D%2214%22%20fill%3D%22none%22%20stroke%3D%22%230a0a0a%22%20stroke-width%3D%222%22%2F%3E%3Cpath%20d%3D%22M16%208v8l5%203%22%20fill%3D%22none%22%20stroke%3D%22%230a0a0a%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E" />
    <style>
      :root { color-scheme: light dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", Pretendard, "Noto Sans KR", sans-serif;
        color: #0a0a0a;
        background: #fafafa;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      .container { max-width: 640px; text-align: center; }
      .eyebrow {
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 24px;
      }
      h1 {
        font-size: clamp(40px, 7vw, 64px);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.05;
        margin-bottom: 24px;
      }
      p.lead {
        font-size: 18px;
        line-height: 1.65;
        color: #374151;
        margin-bottom: 40px;
      }
      .pill {
        display: inline-block;
        padding: 8px 16px;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        font-size: 13px;
        color: #4b5563;
        font-weight: 500;
      }
      .footer {
        position: fixed;
        bottom: 24px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        padding: 0 16px;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #fafafa; background: #0a0a0a; }
        p.lead { color: #d1d5db; }
        .pill { background: #18181b; border-color: #27272a; color: #a1a1aa; }
        .eyebrow { color: #9ca3af; }
        .footer { color: #52525b; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <p class="eyebrow">Coming soon · 2026</p>
        <h1>Chronos Health</h1>
        <p class="lead">
          Digital twin healthcare × decentralized data sovereignty.<br />
          당신의 건강 데이터로 더 오래 건강한 삶을.
        </p>
        <span class="pill">Phase 0 · Foundation</span>
      </div>
    </main>
    <footer class="footer">© 2026 Chronos Health. All rights reserved.</footer>
  </body>
</html>
